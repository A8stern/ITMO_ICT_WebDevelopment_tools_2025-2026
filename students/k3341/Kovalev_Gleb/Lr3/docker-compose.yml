services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finance_lab_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:123@db:5432/finance_lab_db
      PARSER_SERVICE_URL: http://parser:8001
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      - db
      - parser
      - redis

  parser:
    build:
      context: .
      dockerfile: Dockerfile.parser
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:123@db:5432/finance_lab_db
    ports:
      - "8001:8001"
    depends_on:
      - db

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A worker.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:123@db:5432/finance_lab_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - db
      - redis

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A worker.celery_app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:123@db:5432/finance_lab_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - db
      - redis
      - worker

volumes:
  postgres_data:
